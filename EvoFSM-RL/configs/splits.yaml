  revision_notes: |
    v1.1-K1 (2026-05-14): removed `WikipediaDecreaseTextSize50` from
    tier_C_held_out > wikipedia > T_adapt. This template's class exists
    in `task_evals/single/wikipedia.py` but is commented out in
    AndroidWorld upstream's `registry.py`, so harness lookups raise
    KeyError. Wikipedia template count 6 → 5; tier-C total templates
    47 → 46; benchmark grand total 192 → 191.
  protocol: K=1 baseline (one seed per template; matches AndroidWorld leaderboard convention).
  totals_apps: 25
  totals_templates: 191
  note_generic_tasks: OpenApp + SaveCopyOfReceipt (2 generic/composite rows in task_metadata.json) are not assigned to any
    single app and are excluded from the per-app split. Grand vanilla-AndroidWorld total = 116; Plus = 78; combined app-attributable
    = 192.
