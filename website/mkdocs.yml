site_name: EvoFSM
site_description: Test-time adaptation for mobile GUI agents on unseen apps
site_url: https://pockyitachi.github.io/evofsm/
repo_url: https://github.com/pockyitachi/evofsm
repo_name: pockyitachi/evofsm

theme:
  name: material
  font:
    text: Inter
    code: JetBrains Mono
  icon:
    logo: material/cellphone-cog
    repo: fontawesome/brands/github
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.top
    - navigation.instant
    - navigation.instant.progress
    - navigation.tracking
    - toc.follow
    - content.code.copy
    - content.code.annotate
    - search.suggest
    - search.highlight
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: black
      accent: deep purple
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: deep purple
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

nav:
  - Home: index.md
  - Method: method.md
  - Studies:
      - Within-benchmark (AndroidWorld+): within-benchmark.md
      - Cross-benchmark (MobileWorld): cross-benchmark.md
  - Dataset & splits: dataset.md
  - Reproduce: reproduce.md

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.superfences
  - pymdownx.highlight
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

extra_css:
  - stylesheets/extra.css

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/pockyitachi/evofsm

